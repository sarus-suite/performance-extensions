name: release (use devcontainer + cached)

on:
  push:
    branches: [ main, archive_artifact ]
  workflow_dispatch:            # run manually from the Actions tab
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # for manual trigger
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref_name }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prebuild devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer-${{ matrix.arch }}
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer-${{ matrix.arch }}
          push: always

      - name: Build in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer-${{ matrix.arch }}
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer-${{ matrix.arch }}
          push: never
          runCmd: |
            bash -lc '
              cargo build --release
              mkdir -p dist/hooks-${{ matrix.arch }}
              cp target/release/ldcache_hook "dist/hooks-${{ matrix.arch }}/ldcache_hook"
              cp target/release/pce_hook "dist/hooks-${{ matrix.arch }}/pce_hook"
              cp target/release/mps_hook "dist/hooks-${{ matrix.arch }}/mps_hook"
              tar -C dist/hooks-${{ matrix.arch }} -czf "dist/hooks-${{ matrix.arch }}.tar" .
              ls -lah target/release/
              ls -lah dist/
            '

      - name: Upload hook archive
        uses: actions/upload-artifact@v4
        with:
          name: hooks-${{ matrix.arch }}
          path: dist/hooks-${{ matrix.arch }}.tar
          if-no-files-found: error
